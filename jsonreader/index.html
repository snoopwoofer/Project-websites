<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Reader</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #ffffff;
            color: #333333;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #0066cc;
        }

        .input-section {
            margin-bottom: 30px;
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 15px;
            background: #f8f8f8;
            color: #333333;
            border: 2px solid #cccccc;
            border-radius: 5px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 14px;
            resize: vertical;
        }

        textarea:focus {
            outline: none;
            border-color: #007acc;
        }

        .button-container {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }

        button {
            padding: 12px 30px;
            background: #007acc;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #005a9e;
        }

        button:active {
            transform: translateY(1px);
        }

        .clear-btn {
            background: #666;
        }

        .clear-btn:hover {
            background: #555;
        }

        .error-message {
            background: #f44747;
            color: white;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }

        .output-section {
            background: #f8f8f8;
            border: 2px solid #cccccc;
            border-radius: 5px;
            padding: 20px;
            min-height: 200px;
        }

        .json-tree {
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
        }

        .json-item {
            padding-left: 0;
        }

        .json-key {
            color: #0451a5;
        }

        .json-string {
            color: #a31515;
        }

        .json-number {
            color: #098658;
        }

        .json-boolean {
            color: #0000ff;
        }

        .json-null {
            color: #0000ff;
        }

        .json-bracket {
            color: #333333;
        }

        .toggle-icon {
            display: inline-block;
            width: 16px;
            margin-right: 4px;
            color: #808080;
            cursor: pointer;
            font-size: 10px;
        }

        .toggle-icon:hover {
            color: #000000;
        }

        .collapsed .json-children,
        .collapsed br,
        .collapsed > div {
            display: none !important;
        }

        .collapsed .collapsed-close {
            display: inline !important;
        }

        .expanded .collapsed-close {
            display: none !important;
        }

        .collapsed::after {
            content: ' ... ';
            color: #666666;
        }

        .collapsed .toggle-icon::before {
            content: '▶';
        }

        .expanded .toggle-icon::before {
            content: '▼';
        }

        .json-line {
            display: block;
        }

        .toggle-icon,
        .expanded > .json-bracket:first-of-type,
        .collapsed > .json-bracket:first-of-type {
            cursor: pointer;
            user-select: none;
        }

        .comma {
            color: #333333;
        }

        .empty-state {
            text-align: center;
            color: #666666;
            padding: 50px;
        }

        .history-section {
            margin-top: 30px;
            background: #f0f0f0;
            border: 2px solid #cccccc;
            border-radius: 5px;
            padding: 20px;
        }

        .history-section h2 {
            font-size: 18px;
            margin-bottom: 15px;
            color: #0066cc;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .history-item {
            background: #ffffff;
            border: 1px solid #cccccc;
            border-radius: 5px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-item:hover {
            background: #e6f2ff;
            border-color: #007acc;
        }

        .history-preview {
            flex: 1;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 12px;
            color: #333333;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-right: 15px;
        }

        .history-date {
            font-size: 11px;
            color: #666666;
            white-space: nowrap;
        }

        .history-empty {
            text-align: center;
            color: #999999;
            font-style: italic;
            padding: 20px;
        }

        .clear-history-btn {
            margin-top: 15px;
            padding: 8px 20px;
            background: #999999;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .clear-history-btn:hover {
            background: #777777;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>JSON Reader</h1>

        <div class="input-section">
            <textarea id="jsonInput" placeholder="Paste your JSON here..."></textarea>
            <div class="button-container">
                <button id="formatBtn">Format</button>
                <button id="clearBtn" class="clear-btn">Clear</button>
            </div>
        </div>

        <div id="errorMessage" class="error-message"></div>

        <div class="output-section">
            <div id="jsonOutput" class="json-tree">
                <div class="empty-state">Paste JSON above and click "Format" to view</div>
            </div>
        </div>

        <div class="history-section">
            <h2>Recent History (Last 5)</h2>
            <div id="historyList" class="history-list">
                <div class="history-empty">No history yet</div>
            </div>
            <button id="clearHistoryBtn" class="clear-history-btn" style="display: none;">Clear History</button>
        </div>
    </div>

    <script>
        const jsonInput = document.getElementById('jsonInput');
        const formatBtn = document.getElementById('formatBtn');
        const clearBtn = document.getElementById('clearBtn');
        const jsonOutput = document.getElementById('jsonOutput');
        const errorMessage = document.getElementById('errorMessage');
        const historyList = document.getElementById('historyList');
        const clearHistoryBtn = document.getElementById('clearHistoryBtn');

        const MAX_HISTORY = 5;
        const STORAGE_KEY = 'jsonReaderHistory';

        formatBtn.addEventListener('click', formatJSON);
        clearBtn.addEventListener('click', clearAll);
        clearHistoryBtn.addEventListener('click', clearHistory);

        // Load history on page load
        window.addEventListener('DOMContentLoaded', loadHistory);

        function formatJSON() {
            const input = jsonInput.value.trim();

            if (!input) {
                showError('Please paste some JSON first!');
                return;
            }

            try {
                const parsed = JSON.parse(input);
                hideError();
                renderJSON(parsed);
                saveToHistory(input);
            } catch (e) {
                showError(`Invalid JSON: ${e.message}`);
            }
        }

        function clearAll() {
            jsonInput.value = '';
            jsonOutput.innerHTML = '<div class="empty-state">Paste JSON above and click "Format" to view</div>';
            hideError();
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
        }

        function hideError() {
            errorMessage.style.display = 'none';
        }

        function renderJSON(data) {
            jsonOutput.innerHTML = '';
            const tree = createJSONTree(data, 0);
            jsonOutput.appendChild(tree);
        }

        function createJSONTree(data, level, needsComma = false) {
            const container = document.createElement('span');

            if (data === null) {
                const nullSpan = document.createElement('span');
                nullSpan.className = 'json-null';
                nullSpan.textContent = 'null';
                container.appendChild(nullSpan);
            } else if (typeof data === 'string') {
                const stringSpan = document.createElement('span');
                stringSpan.className = 'json-string';
                stringSpan.textContent = `"${data}"`;
                container.appendChild(stringSpan);
            } else if (typeof data === 'number') {
                const numberSpan = document.createElement('span');
                numberSpan.className = 'json-number';
                numberSpan.textContent = data;
                container.appendChild(numberSpan);
            } else if (typeof data === 'boolean') {
                const boolSpan = document.createElement('span');
                boolSpan.className = 'json-boolean';
                boolSpan.textContent = data;
                container.appendChild(boolSpan);
            } else if (Array.isArray(data)) {
                container.appendChild(createArrayTree(data, level, needsComma));
            } else if (typeof data === 'object') {
                container.appendChild(createObjectTree(data, level, needsComma));
            }

            return container;
        }

        function createObjectTree(obj, level, needsComma = false) {
            const container = document.createElement('span');
            const keys = Object.keys(obj);
            const indent = '\u00A0'.repeat(level * 4);

            if (keys.length === 0) {
                const bracket = document.createElement('span');
                bracket.className = 'json-bracket';
                bracket.textContent = '{}';
                container.appendChild(bracket);
                return container;
            }

            const wrapper = document.createElement('span');
            wrapper.className = 'expanded';

            const toggle = document.createElement('span');
            toggle.className = 'toggle-icon';

            const toggleCollapse = (e) => {
                e.stopPropagation();
                wrapper.classList.toggle('collapsed');
                wrapper.classList.toggle('expanded');
            };

            toggle.addEventListener('click', toggleCollapse);

            wrapper.appendChild(toggle);

            const openBracket = document.createElement('span');
            openBracket.className = 'json-bracket';
            openBracket.textContent = '{';
            openBracket.style.cursor = 'pointer';
            openBracket.addEventListener('click', toggleCollapse);
            wrapper.appendChild(openBracket);

            const collapsedCloseBracket = document.createElement('span');
            collapsedCloseBracket.className = 'json-bracket collapsed-close';
            collapsedCloseBracket.textContent = '}';
            collapsedCloseBracket.style.display = 'none';
            wrapper.appendChild(collapsedCloseBracket);

            const newLine = document.createElement('br');
            wrapper.appendChild(newLine);

            const childrenContainer = document.createElement('div');
            childrenContainer.className = 'json-children';
            childrenContainer.style.display = 'block';

            keys.forEach((key, index) => {
                const value = obj[key];
                const isLast = index === keys.length - 1;
                const isComplex = (typeof value === 'object' && value !== null);

                const item = document.createElement('div');
                item.className = 'json-item';
                item.style.display = 'block';

                const childIndent = '\u00A0'.repeat((level + 1) * 4);
                const textNode = document.createTextNode(childIndent);
                item.appendChild(textNode);

                const keySpan = document.createElement('span');
                keySpan.className = 'json-key';
                keySpan.textContent = `"${key}"`;
                item.appendChild(keySpan);

                const colon = document.createElement('span');
                colon.className = 'json-bracket';
                colon.textContent = ': ';
                item.appendChild(colon);

                const valueTree = createJSONTree(value, level + 1, !isLast && isComplex);
                item.appendChild(valueTree);

                if (!isLast && !isComplex) {
                    const comma = document.createElement('span');
                    comma.className = 'comma';
                    comma.textContent = ',';
                    item.appendChild(comma);
                }

                childrenContainer.appendChild(item);
            });

            wrapper.appendChild(childrenContainer);

            const footerLine = document.createElement('div');
            footerLine.style.display = 'block';
            const footerIndent = document.createTextNode(indent);
            footerLine.appendChild(footerIndent);
            const closeBracket = document.createElement('span');
            closeBracket.className = 'json-bracket';
            closeBracket.textContent = '}';
            footerLine.appendChild(closeBracket);

            if (needsComma) {
                const comma = document.createElement('span');
                comma.className = 'comma';
                comma.textContent = ',';
                footerLine.appendChild(comma);
            }

            wrapper.appendChild(footerLine);

            container.appendChild(wrapper);
            return container;
        }

        function createArrayTree(arr, level, needsComma = false) {
            const container = document.createElement('span');
            const indent = '\u00A0'.repeat(level * 4);

            if (arr.length === 0) {
                const bracket = document.createElement('span');
                bracket.className = 'json-bracket';
                bracket.textContent = '[]';
                container.appendChild(bracket);
                return container;
            }

            const wrapper = document.createElement('span');
            wrapper.className = 'expanded';

            const toggle = document.createElement('span');
            toggle.className = 'toggle-icon';

            const toggleCollapse = (e) => {
                e.stopPropagation();
                wrapper.classList.toggle('collapsed');
                wrapper.classList.toggle('expanded');
            };

            toggle.addEventListener('click', toggleCollapse);

            wrapper.appendChild(toggle);

            const openBracket = document.createElement('span');
            openBracket.className = 'json-bracket';
            openBracket.textContent = '[';
            openBracket.style.cursor = 'pointer';
            openBracket.addEventListener('click', toggleCollapse);
            wrapper.appendChild(openBracket);

            const collapsedCloseBracket = document.createElement('span');
            collapsedCloseBracket.className = 'json-bracket collapsed-close';
            collapsedCloseBracket.textContent = ']';
            collapsedCloseBracket.style.display = 'none';
            wrapper.appendChild(collapsedCloseBracket);

            const newLine = document.createElement('br');
            wrapper.appendChild(newLine);

            const childrenContainer = document.createElement('div');
            childrenContainer.className = 'json-children';
            childrenContainer.style.display = 'block';

            arr.forEach((item, index) => {
                const isLast = index === arr.length - 1;
                const isComplex = (typeof item === 'object' && item !== null);

                const itemDiv = document.createElement('div');
                itemDiv.className = 'json-item';
                itemDiv.style.display = 'block';

                const childIndent = '\u00A0'.repeat((level + 1) * 4);
                const textNode = document.createTextNode(childIndent);
                itemDiv.appendChild(textNode);

                const valueTree = createJSONTree(item, level + 1, !isLast && isComplex);
                itemDiv.appendChild(valueTree);

                if (!isLast && !isComplex) {
                    const comma = document.createElement('span');
                    comma.className = 'comma';
                    comma.textContent = ',';
                    itemDiv.appendChild(comma);
                }

                childrenContainer.appendChild(itemDiv);
            });

            wrapper.appendChild(childrenContainer);

            const footerLine = document.createElement('div');
            footerLine.style.display = 'block';
            const footerIndent = document.createTextNode(indent);
            footerLine.appendChild(footerIndent);
            const closeBracket = document.createElement('span');
            closeBracket.className = 'json-bracket';
            closeBracket.textContent = ']';
            footerLine.appendChild(closeBracket);

            if (needsComma) {
                const comma = document.createElement('span');
                comma.className = 'comma';
                comma.textContent = ',';
                footerLine.appendChild(comma);
            }

            wrapper.appendChild(footerLine);

            container.appendChild(wrapper);
            return container;
        }

        // History Management Functions
        function saveToHistory(jsonString) {
            let history = getHistory();

            const newEntry = {
                json: jsonString,
                timestamp: new Date().toISOString(),
                preview: jsonString.substring(0, 80)
            };

            // Remove duplicates
            history = history.filter(item => item.json !== jsonString);

            // Add to beginning
            history.unshift(newEntry);

            // Keep only last 5
            if (history.length > MAX_HISTORY) {
                history = history.slice(0, MAX_HISTORY);
            }

            localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
            displayHistory();
        }

        function getHistory() {
            const stored = localStorage.getItem(STORAGE_KEY);
            return stored ? JSON.parse(stored) : [];
        }

        function loadHistory() {
            displayHistory();
        }

        function displayHistory() {
            const history = getHistory();

            if (history.length === 0) {
                historyList.innerHTML = '<div class="history-empty">No history yet</div>';
                clearHistoryBtn.style.display = 'none';
                return;
            }

            historyList.innerHTML = '';
            clearHistoryBtn.style.display = 'block';

            history.forEach((entry, index) => {
                const item = document.createElement('div');
                item.className = 'history-item';

                const preview = document.createElement('div');
                preview.className = 'history-preview';
                preview.textContent = entry.preview;

                const date = document.createElement('div');
                date.className = 'history-date';
                date.textContent = formatDate(entry.timestamp);

                item.appendChild(preview);
                item.appendChild(date);

                item.addEventListener('click', () => loadFromHistory(entry.json));

                historyList.appendChild(item);
            });
        }

        function loadFromHistory(jsonString) {
            jsonInput.value = jsonString;
            try {
                const parsed = JSON.parse(jsonString);
                hideError();
                renderJSON(parsed);
            } catch (e) {
                showError(`Invalid JSON: ${e.message}`);
            }
        }

        function clearHistory() {
            if (confirm('Are you sure you want to clear all history?')) {
                localStorage.removeItem(STORAGE_KEY);
                displayHistory();
            }
        }

        function formatDate(isoString) {
            const date = new Date(isoString);
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const itemDate = new Date(date.getFullYear(), date.getMonth(), date.getDate());

            const timeStr = date.toLocaleTimeString('en-US', {
                hour: '2-digit',
                minute: '2-digit'
            });

            if (itemDate.getTime() === today.getTime()) {
                return `Today at ${timeStr}`;
            } else if (itemDate.getTime() === today.getTime() - 86400000) {
                return `Yesterday at ${timeStr}`;
            } else {
                const dateStr = date.toLocaleDateString('en-US', {
                    month: 'short',
                    day: 'numeric',
                    year: date.getFullYear() !== now.getFullYear() ? 'numeric' : undefined
                });
                return `${dateStr} at ${timeStr}`;
            }
        }

    </script>
</body>
</html>
